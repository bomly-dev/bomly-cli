# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
  # Skip generated artifacts and fixtures so reviews focus on hand-written code.
  path_filters:
    - "!docs/CONFIG_REFERENCE.md"
    - "!docs/SUPPORT_MATRIX.md"
    - "!docs/schemas/**"
    - "!**/*.golden.json"
    - "!**/testdata/**"
chat:
  auto_reply: true
