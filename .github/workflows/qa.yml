name: Dependency Graph QA

on:
  workflow_dispatch:
    inputs:
      cases:
        description: "Optional comma-separated QA case names"
        required: false
        default: ""
      sources:
        description: "Optional comma-separated QA sources: github, syft, syft-cyclonedx"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: dependency-graph-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HAS_COPILOT_AGENT_TOKEN: ${{ secrets.COPILOT_AGENT_TOKEN != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install QA dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y maven
          python -m pip install --upgrade pip pipenv poetry
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          syft version

      - name: Run dependency graph QA
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          args=()
          if [ -n "${{ inputs.cases }}" ]; then
            args+=("--case=${{ inputs.cases }}")
          fi
          if [ -n "${{ inputs.sources }}" ]; then
            args+=("--source=${{ inputs.sources }}")
          fi
          make qa ARGS="${args[*]}"

      - name: Require Copilot agent token
        if: always() && env.HAS_COPILOT_AGENT_TOKEN != 'true'
        run: |
          echo "COPILOT_AGENT_TOKEN is required to generate .qa-runs/latest/qa-report.md with Copilot CLI."
          echo "Create a fine-grained PAT with Copilot Requests permission and store it as the COPILOT_AGENT_TOKEN secret."
          exit 1

      - name: Install Copilot CLI
        if: always() && env.HAS_COPILOT_AGENT_TOKEN == 'true'
        run: npm install -g @github/copilot

      - name: Generate Copilot QA report
        if: always() && env.HAS_COPILOT_AGENT_TOKEN == 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_AGENT_TOKEN }}
        run: |
          if ! compgen -G ".qa-runs/latest/cases/*/sources/*/qa-summary.json" > /dev/null; then
            echo "No QA summaries found under .qa-runs/latest/cases."
            exit 1
          fi
          copilot -p "$(cat .github/prompts/bomly-qa-report.prompt.md)" --allow-tool=write --no-ask-user

      - name: Verify Copilot QA report
        if: always() && env.HAS_COPILOT_AGENT_TOKEN == 'true'
        run: test -f .qa-runs/latest/qa-report.md

      - name: Print Copilot QA report
        if: always() && env.HAS_COPILOT_AGENT_TOKEN == 'true'
        run: |
          echo "----- Bomly QA Report -----"
          cat .qa-runs/latest/qa-report.md
          echo "----- End Bomly QA Report -----"

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-graph-qa
          path: .qa-runs/latest
          if-no-files-found: ignore
          retention-days: 7
