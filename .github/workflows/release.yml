name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum

      - name: Run test suite
        run: make test

      - name: Run go vet
        run: go vet ./...

  release:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      packages: write
      id-token: write # required for cosign keyless signing
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum

      - name: Mint package-manager token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: package-token
        with:
          client-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: bomly-dev
          repositories: |
            homebrew-tap
            scoop-bucket
          permission-contents: write
          permission-pull-requests: write

      - name: Mint release token
        # Used as GoReleaser's GITHUB_TOKEN to publish the release to this repo.
        # The default GITHUB_TOKEN cannot be used here: GitHub does not start new
        # workflow runs from events triggered by the default token, so a release
        # published with it would never fire the `release: published` trigger on
        # "Release lifecycle sync" (notify-landing-yank.yml) — and the
        # landing-page docs sync (repository_dispatch) would silently never run.
        # An app token is attributed to the app, so the publish event cascades.
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: release-token
        with:
          client-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: bomly-dev
          repositories: bomly-cli
          permission-contents: write

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.16.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ steps.release-token.outputs.token }}
          TAP_GITHUB_TOKEN: ${{ steps.package-token.outputs.token }}
          SCOOP_GITHUB_TOKEN: ${{ steps.package-token.outputs.token }}
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}

      - name: Generate artifact hashes for SLSA provenance
        id: hash
        run: echo "hashes=$(base64 -w0 < dist/SHA256SUMS)" >> "$GITHUB_OUTPUT"

  provenance:
    needs: release
    permissions:
      actions: read # detect the workflow that triggered this run
      id-token: write # sign the provenance
      contents: write # upload the provenance to the release
    # The SLSA generator MUST be pinned by a full vX.Y.Z tag, not a commit SHA or
    # shorter tag — slsa-verifier resolves the builder identity from this exact ref,
    # and SHA-pinning breaks that resolution. See .github/pinact.yaml, which excludes
    # this line from automated re-pinning.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.release.outputs.hashes }}
      upload-assets: ${{ startsWith(github.ref, 'refs/tags/') }}
