name: SBOM interoperability assurance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate generated SBOMs
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Build the offline-capable CLI
        run: make build-lite

      - name: Generate and validate canonical SBOMs
        run: go run ./internal/tools/sbomassurance -bomly ./bin/bomly-lite -output sbom-assurance-artifacts

      - name: Upload assurance evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-interoperability-${{ github.run_id }}
          path: sbom-assurance-artifacts/
          if-no-files-found: error
          retention-days: 14
