name: Update Smoke Goldens

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git ref to regenerate golden files from
        required: true
        default: main
        type: string
      base_ref:
        description: Base branch for the pull request
        required: true
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: update-smoke-goldens-${{ github.event.inputs.source_ref }}
  cancel-in-progress: false

jobs:
  regenerate:
    name: Regenerate (${{ matrix.slice.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        slice:
          # Every golden-producing smoke test must be matched by exactly one
          # slice so the per-slice artifacts never overlap. Reachability cases
          # get their own slices: they are the slowest, most network-dependent
          # cases, and isolating them keeps a stall from blocking the rest of
          # an ecosystem's goldens.
          - name: go
            run: 'TestScan/scan-go$|TestDiff/diff-go|TestExplain/explain-go|TestAuditScan/(scan-go-enrich|scan-go-audit)|TestAuditDiffAndExplain|TestLiteScan/lite-scan-go|TestLiteDiff|TestLiteExplain'
          - name: go-reachability
            run: 'TestScan/scan-go-reachability'
          - name: node
            run: 'TestScan/(scan-npm$|scan-npm-scope-runtime|scan-npm-workspaces|scan-yarn|scan-pnpm|scan-bun$|scan-github-actions)|TestDiff/diff-npm|TestAuditScan/scan-npm-audit'
            node: true
          - name: node-reachability
            run: 'TestScan/scan-npm-reachability'
            node: true
          - name: java
            run: 'TestScan/(scan-maven|scan-gradle|scan-recursive-monorepo)'
            java: true
            maven: true
          - name: java-reachability
            run: 'TestScan/scan-java-maven-reachability'
            java: true
            maven: true
          - name: python
            run: 'TestScan/(scan-python-pip$|scan-python-pipenv|scan-python-poetry)'
            python: true
          - name: python-reachability
            run: 'TestScan/scan-python-pip-reachability'
            python: true
          - name: uv
            run: 'TestScan/scan-python-uv'
            python: true
            uv: true
          - name: php
            run: 'TestScan/scan-composer'
          - name: ruby
            run: 'TestScan/scan-bundler'
          - name: dotnet
            run: 'TestScan/scan-nuget'
            dotnet: true
          - name: rust
            run: 'TestScan/scan-cargo'
          - name: dart
            run: 'TestScan/scan-pub'
            dart: true
          - name: swift
            run: 'TestScan/(scan-cocoapods|scan-swiftpm)'
          - name: elixir
            run: 'TestScan/scan-mix'
          - name: scala
            run: 'TestScan/scan-sbt'
          - name: cpp
            run: 'TestScan/scan-cpp-conan'
          - name: sbom
            run: 'TestScan/scan-sbom|TestDiff/diff-sbom|TestLiteScan/lite-scan-sbom'
          - name: plugin
            run: 'TestPluginWorkflows'
          - name: container
            run: 'TestContainer'
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_ref }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum

      - name: Set up Node.js
        if: matrix.slice.node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Set up Python
        if: matrix.slice.python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up Java
        if: matrix.slice.java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up .NET
        if: matrix.slice.dotnet
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "8.0.x"

      - name: Set up Dart
        if: matrix.slice.dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      - name: Set up uv
        if: matrix.slice.uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install Python smoke-test dependencies
        if: matrix.slice.python
        run: python -m pip install --require-hashes -r .github/requirements-ci-tools.txt

      - name: Install Maven
        if: matrix.slice.maven
        run: |
          sudo apt-get update
          sudo apt-get install -y maven

      # Mirrors `make smoke` but invokes go test directly: the slice patterns
      # use $ anchors, which make would expand (e.g. `$|` becomes empty) if
      # passed through ARGS.
      - name: Regenerate golden files
        run: go test -tags smoke ./test/smoke/ -v -count=1 -timeout 15m -update -run '${{ matrix.slice.run }}'

      - name: Stage regenerated goldens
        # Runs even when the slice fails: goldens written before the failure
        # are still valid, and the failed slice stays visibly red.
        if: always()
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          staging="${RUNNER_TEMP}/goldens"
          mkdir -p "${staging}"
          {
            git diff --name-only -- test/smoke/testdata/golden
            git ls-files --others --exclude-standard -- test/smoke/testdata/golden
          } | sort -u > "${RUNNER_TEMP}/changed-goldens.txt"
          if [ -s "${RUNNER_TEMP}/changed-goldens.txt" ]; then
            while IFS= read -r file; do
              mkdir -p "${staging}/$(dirname "${file}")"
              cp "${file}" "${staging}/${file}"
            done < "${RUNNER_TEMP}/changed-goldens.txt"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload regenerated goldens
        if: always() && steps.stage.outputs.changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: goldens-${{ matrix.slice.name }}
          # Point at the golden directory itself so artifact paths are
          # relative to it and download-artifact can merge every slice
          # straight into test/smoke/testdata/golden.
          path: ${{ runner.temp }}/goldens/test/smoke/testdata/golden
          if-no-files-found: error
          retention-days: 7

  open-pr:
    name: Open goldens pull request
    needs: regenerate
    # Collect whatever the slices produced even when some failed; the failed
    # slices stay red on the run and are listed in the PR body.
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_ref }}

      - name: Download regenerated goldens
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: goldens-*
          merge-multiple: true
          path: test/smoke/testdata/golden

      - name: Detect golden file changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- test/smoke/testdata/golden)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: List failed slices
        id: failures
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          failed="$(gh run view "${RUN_ID}" --repo "${GITHUB_REPOSITORY}" --json jobs \
            --jq '[.jobs[] | select(.name | startswith("Regenerate (")) | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out") | .name] | join(", ")')"
          echo "failed=${failed}" >> "$GITHUB_OUTPUT"

      - name: Create pull request with updated goldens
        if: steps.changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SOURCE_REF: ${{ inputs.source_ref }}
          BASE_REF: ${{ inputs.base_ref }}
          RUN_ID: ${{ github.run_id }}
          FAILED_SLICES: ${{ steps.failures.outputs.failed }}
        shell: bash
        run: |
          set -euo pipefail

          sanitized_ref="$(echo "${SOURCE_REF}" | tr '/:' '--')"
          branch_name="automation/update-smoke-goldens-${sanitized_ref}-${RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "${branch_name}"
          git add test/smoke/testdata/golden
          git commit -m "test: update smoke golden files"
          git push --set-upstream origin "${branch_name}"

          body="Automated smoke golden update generated from \`${SOURCE_REF}\` after maintainer review."
          if [ -n "${FAILED_SLICES}" ]; then
            run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}"
            body="$(printf '%s\n\n> [!WARNING]\n> These regeneration slices failed, so their goldens may be missing or partial: %s. Check the [workflow run](%s) and re-run the failed jobs before relying on this PR for those ecosystems.' "${body}" "${FAILED_SLICES}" "${run_url}")"
          fi

          gh pr create \
            --base "${BASE_REF}" \
            --head "${branch_name}" \
            --title "test: update smoke golden files" \
            --body "${body}"

      - name: Report no-op run
        if: steps.changes.outputs.changed != 'true'
        shell: bash
        run: |
          echo "Smoke golden files already match the regenerated outputs."
          if [ -n "${{ steps.failures.outputs.failed }}" ]; then
            echo "Note: some slices failed and produced no goldens: ${{ steps.failures.outputs.failed }}"
          fi
