name: Update Smoke Goldens

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git ref to regenerate golden files from
        required: true
        default: main
        type: string
      base_ref:
        description: Base branch for the pull request
        required: true
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: update-smoke-goldens-${{ github.event.inputs.source_ref }}
  cancel-in-progress: false

jobs:
  update-goldens:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_ref }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "8.0.x"

      - name: Set up Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Install smoke-test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y maven
          python -m pip install --upgrade pip pipenv poetry

      - name: Regenerate golden files
        run: make smoke ARGS="-update"

      - name: Detect golden file changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- test/smoke/testdata/golden; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request with updated goldens
        if: steps.changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SOURCE_REF: ${{ inputs.source_ref }}
          BASE_REF: ${{ inputs.base_ref }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail

          sanitized_ref="$(echo "${SOURCE_REF}" | tr '/:' '--')"
          branch_name="automation/update-smoke-goldens-${sanitized_ref}-${RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "${branch_name}"
          git add test/smoke/testdata/golden
          git commit -m "test: update smoke golden files"
          git push --set-upstream origin "${branch_name}"

          gh pr create \
            --base "${BASE_REF}" \
            --head "${branch_name}" \
            --title "test: update smoke golden files" \
            --body "Automated smoke golden update generated from \`${SOURCE_REF}\` after maintainer review."

      - name: Report no-op run
        if: steps.changes.outputs.changed != 'true'
        run: echo "Smoke golden files already match the regenerated outputs."
