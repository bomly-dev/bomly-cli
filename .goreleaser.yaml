version: 2

project_name: bomly

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

before:
  hooks:
    - go mod download
    - make licenses

builds:
  - id: bomly
    main: ./cmd/bomly
    binary: bomly
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: bomly-lite
    main: ./cmd/bomly
    binary: bomly-lite
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    tags:
      - bomly_external_syft
      - bomly_external_grype
    ldflags:
      - -s -w -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: bomly
    ids:
      - bomly
    name_template: "bomly_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - NOTICE
      - src: licenses/**/*
        dst: licenses

  - id: bomly-lite
    ids:
      - bomly-lite
    name_template: "bomly-lite_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - NOTICE
      - src: licenses/**/*
        dst: licenses

checksum:
  name_template: "SHA256SUMS"

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github-native

release:
  github:
    owner: bomly-dev
    name: bomly-cli
  # Stays a draft until the `publish` job in release.yml finalizes it. GitHub's
  # immutable releases feature forbids adding assets once a release is
  # published, and the SLSA provenance file is attached by a later job — so
  # publishing has to be the last step, after every asset (including
  # provenance) is in place. See dev-docs/CI.md.
  draft: true
  prerelease: auto
  footer: |
    ---
    ### Release artifacts

    - Full builtin `bomly` archives for Linux, macOS, and Windows.
    - Alternate `bomly-lite` archives for users who prefer external Syft and Grype binaries.
    - Linux packages for Debian, RPM, Alpine, and Arch-compatible package managers.
    - Homebrew, Scoop, and WinGet package-manager manifests or publishing pull requests.
    - `SHA256SUMS` for release artifact verification, signed keylessly with [cosign](https://docs.sigstore.dev/cosign/signing/overview/) (`SHA256SUMS.sigstore.json`).
    - SLSA Build Level 3 provenance (`multiple.intoto.jsonl`) generated by [slsa-github-generator](https://github.com/slsa-framework/slsa-github-generator).

    Each archive includes `LICENSE`, `NOTICE`, and a `licenses/` directory with third-party license texts. See [Verify release checksums](https://github.com/bomly-dev/bomly-cli/blob/main/docs/INSTALLATION.md#verify-release-checksums) for signature and provenance verification commands.

nfpms:
  - id: bomly-linux-packages
    ids:
      - bomly
    package_name: bomly
    file_name_template: "bomly_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    vendor: Bomly
    homepage: https://bomly.dev/cli
    maintainer: Ahmed ElMallah <ahmed@bomly.dev>
    description: Free, open-source CLI for dependency intelligence and SBOM analysis.
    license: Apache-2.0
    bindir: /usr/bin
    section: utils
    priority: optional
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    contents:
      - src: LICENSE
        dst: /usr/share/doc/bomly/LICENSE
      - src: NOTICE
        dst: /usr/share/doc/bomly/NOTICE

# Published as a Homebrew formula (not a cask): casks get the
# com.apple.quarantine attribute, which trips macOS Gatekeeper ("Apple could
# not verify bomly") for our un-notarized binary. Formula downloads are never
# quarantined, so the CLI runs without a prompt.
# NOTE: `brews` is deprecated as of GoReleaser v2.10 but still functional. If it
# is removed, replace this with a custom step that templates Formula/bomly.rb in
# the tap from SHA256SUMS (see dev-docs/RELEASE_CHECKLIST.md).
brews:
  - name: bomly
    ids:
      - bomly
    homepage: https://bomly.dev/cli
    description: Free, open-source CLI for dependency intelligence and SBOM analysis
    license: Apache-2.0
    directory: Formula
    commit_msg_template: "Update Bomly CLI to {{ .Tag }}"
    install: |
      bin.install "bomly"
    test: |
      system "#{bin}/bomly", "version"
    repository:
      owner: bomly-dev
      name: homebrew-tap
      branch: "bomly-{{ .Version }}"
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        draft: false

scoops:
  - name: bomly
    ids:
      - bomly
    homepage: https://bomly.dev/cli
    description: Free, open-source CLI for dependency intelligence and SBOM analysis.
    license: Apache-2.0
    commit_msg_template: "Update Bomly CLI to {{ .Tag }}"
    repository:
      owner: bomly-dev
      name: scoop-bucket
      branch: "bomly-{{ .Version }}"
      token: "{{ .Env.SCOOP_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        draft: false

winget:
  - name: bomly
    ids:
      - bomly
    publisher: Bomly
    package_identifier: Bomly.BomlyCLI
    package_name: Bomly CLI
    short_description: Free, open-source CLI for dependency intelligence and SBOM analysis.
    description: Bomly is a free, open-source CLI that scans your projects, SBOMs, and container images, explains where each dependency came from, and surfaces vulnerability and license data when you ask for it.
    license: Apache-2.0
    homepage: https://bomly.dev/cli
    publisher_url: https://github.com/bomly-dev
    publisher_support_url: https://github.com/bomly-dev/bomly-cli/issues
    license_url: https://github.com/bomly-dev/bomly-cli/blob/main/LICENSE
    copyright: Copyright Bomly contributors
    tags:
      - cli
      - security
      - dependencies
      - sbom
      - vulnerability
    commit_msg_template: "Update Bomly CLI to {{ .Tag }}"
    repository:
      owner: bomly-dev
      name: winget-pkgs
      branch: "bomly-{{ .Version }}"
      token: "{{ .Env.WINGET_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        draft: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
