<svg width="440" height="120" viewBox="0 0 440 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bomly CLI">
  <title>Bomly CLI</title>
  <defs>
    <linearGradient id="boxTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="boxLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="boxRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#155e75"/>
    </linearGradient>
  </defs>

  <!-- Isometric box mark (bill of materials) -->
  <g transform="translate(20 20)">
    <polygon points="36,0 72,20 36,40 0,20" fill="url(#boxTop)"/>
    <polygon points="0,20 36,40 36,80 0,60" fill="url(#boxLeft)"/>
    <polygon points="72,20 36,40 36,80 72,60" fill="url(#boxRight)"/>
    <!-- subtle inner edge highlight -->
    <polyline points="36,40 36,80" stroke="#0a4a5c" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <text x="110" y="76" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="56" font-weight="700" fill="#06b6d4" letter-spacing="-1">Bomly</text>

  <!-- CLI pill -->
  <g transform="translate(330 36)">
    <rect x="0" y="0" width="86" height="44" rx="10" fill="#06b6d4"/>
    <text x="43" y="31" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="2">CLI</text>
  </g>
</svg>
